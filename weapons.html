<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Impact Team Damage Calculator — Weapons</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/my-artifacts.css">
    <link rel="stylesheet" href="css/my-weapons.css">
</head>

<body>
    <div class="min-h-screen bg-background text-foreground">

        <!-- HEADER / TAB NAV -->
        <header class="sticky top-0 z-50 border-b border-border bg-background/80 backdrop-blur-md">
            <div class="container flex items-center justify-between py-4">
                <div class="flex items-center gap-2">
                    <a href="index.html" class="text-xl font-black tracking-tight">GENSHIN<span class="text-primary">CALC</span></a>
                </div>
                <nav class="flex items-center gap-1 rounded-lg border border-border bg-secondary p-1" id="main-tabs">
                    <a href="characters.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Characters</a>
                    <a href="weapons.html" class="tab-button active px-4 py-2 rounded-md text-sm font-medium transition-colors">Weapons</a>
                    <a href="artifacts.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Artifacts</a>
                    <a href="teams.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Teams</a>
                </nav>
            </div>
        </header>

        <main class="container py-8">

            <!-- ============ MY WEAPONS ============ -->
            <section id="page-my-weapons" class="mb-12">
                <div class="mb-6 flex items-center justify-between flex-wrap gap-4">
                    <div>
                        <h2 class="text-3xl font-bold">My Weapons</h2>
                        <p class="text-sm text-muted-foreground mt-1">Weapons you've built, saved to this browser.</p>
                    </div>
                    <button id="open-weapon-select-modal-btn"
                        class="px-4 py-2 rounded-md bg-primary text-primary-foreground text-sm font-semibold hover:bg-primary/90 transition-colors">
                        + Add New Weapon
                    </button>
                </div>

                <!-- Empty state -->
                <div id="my-weapons-empty-state" class="rounded-xl border border-dashed border-border p-12 text-center hidden">
                    <p class="text-muted-foreground">No weapons yet.</p>
                    <p class="text-sm text-muted-foreground/70 mt-1">Add your first one to start building loadouts.</p>
                </div>

                <!-- My Weapons grid (rendered by js/myWeapons.js) -->
                <div id="my-weapons-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
            </section>

        </main>
    </div>

    <!-- ============ WEAPON SELECT MODAL ============ -->
    <div id="weapon-select-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div id="weapon-select-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

        <div class="modal-panel relative w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-xl border border-border bg-card p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">Select a Weapon</h3>
                <button id="close-weapon-select-modal-btn" class="text-muted-foreground hover:text-foreground transition-colors text-xl leading-none">&times;</button>
            </div>

            <input id="weapon-search-input" type="text" placeholder="Search weapons…"
                class="weapon-search-input field-input w-full h-10 rounded-md border border-input bg-transparent px-3 text-sm mb-4 focus:outline-none focus:ring-1 focus:ring-ring">

            <div id="weapon-select-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- ============ WEAPON CREATE MODAL ============ -->
    <div id="weapon-create-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div id="weapon-create-overlay" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

        <div class="modal-panel relative w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-xl border border-border bg-card p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 id="weapon-create-title" class="text-lg font-semibold">Weapon Name</h3>
                <button id="close-weapon-create-modal-btn" class="text-muted-foreground hover:text-foreground transition-colors text-xl leading-none">&times;</button>
            </div>

            <div id="weapon-create-error" class="hidden mb-4 rounded-md border border-destructive/50 bg-red-500/10 px-3 py-2 text-xs text-red-400"></div>

            <div class="space-y-4">
                <!-- Refinement -->
                <div>
                    <label class="block text-xs font-medium text-muted-foreground mb-1.5">Refinement Level</label>
                    <div class="flex gap-2">
                        <button type="button" class="refinement-btn active" data-refinement="1">R1</button>
                        <button type="button" class="refinement-btn" data-refinement="2">R2</button>
                        <button type="button" class="refinement-btn" data-refinement="3">R3</button>
                        <button type="button" class="refinement-btn" data-refinement="4">R4</button>
                        <button type="button" class="refinement-btn" data-refinement="5">R5</button>
                    </div>
                </div>

                <!-- Level -->
                <div>
                    <label class="block text-xs font-medium text-muted-foreground mb-1.5" for="weapon-level-input">Level</label>
                    <input id="weapon-level-input" type="number" min="1" max="90" value="90"
                        class="field-input w-full h-10 rounded-md border border-input bg-transparent px-3 text-sm focus:outline-none focus:ring-1 focus:ring-ring">
                </div>

                <!-- Live preview -->
                <div class="weapon-preview-box space-y-2">
                    <p id="weapon-preview-main-stat" class="weapon-preview-line stat-line"></p>
                    <p id="weapon-preview-sub-stat" class="weapon-preview-line stat-line"></p>
                    <div class="pt-2 border-t border-border/50">
                        <p id="weapon-preview-passive-name" class="text-xs font-semibold text-primary mb-1"></p>
                        <div id="weapon-preview-passive-body" class="space-y-0.5"></div>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 mt-6">
                <button id="create-weapon-btn"
                    class="flex-1 py-2.5 rounded-md bg-primary text-primary-foreground text-sm font-semibold hover:bg-primary/90 transition-colors">
                    Create
                </button>
            </div>
        </div>
    </div>

    <script src="js/weaponData.js"></script>
    <script src="js/myWeapons.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
