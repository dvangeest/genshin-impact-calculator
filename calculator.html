<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Impact Team Damage Calculator — Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/my-artifacts.css">
    <link rel="stylesheet" href="css/calculator.css">
</head>

<body>
    <div class="min-h-screen bg-background text-foreground">

        <!-- HEADER / TAB NAV -->
        <header class="sticky top-0 z-50 border-b border-border bg-background/80 backdrop-blur-md">
            <div class="container flex items-center justify-between py-4">
                <div class="flex items-center gap-2">
                    <a href="index.html" class="text-xl font-black tracking-tight">GENSHIN<span class="text-primary">CALC</span></a>
                </div>
                <nav class="flex items-center gap-1 rounded-lg border border-border bg-secondary p-1" id="main-tabs">
                    <a href="characters.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Characters</a>
                    <a href="weapons.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Weapons</a>
                    <a href="artifacts.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Artifacts</a>
                    <a href="teams.html" class="tab-button px-4 py-2 rounded-md text-sm font-medium transition-colors text-muted-foreground">Teams</a>
                    <a href="calculator.html" class="tab-button active px-4 py-2 rounded-md text-sm font-medium transition-colors">Calculator</a>
                </nav>
            </div>
        </header>

        <main class="container py-8 space-y-6">

            <div>
                <h2 class="text-3xl font-bold">Team Damage Calculator</h2>
                <p class="text-sm text-muted-foreground mt-1">Build a rotation timeline for up to 4 saved characters and see live DPS/DPR.</p>
            </div>

            <!-- Team slots -->
            <section>
                <h3 class="text-sm font-semibold text-muted-foreground uppercase tracking-wide mb-2">Team</h3>
                <div id="calc-team-slots" class="rotation-team-grid"></div>
            </section>

            <!-- Timeline controls -->
            <section class="rotation-preset-bar">
                <label class="text-xs text-muted-foreground" for="calc-duration-input">Duration (s)</label>
                <input id="calc-duration-input" type="number" min="1" max="300" step="1" value="20"
                    class="field-input h-9 w-20 rounded-md border border-input bg-transparent px-2 text-sm">
                <label class="text-xs text-muted-foreground ml-4" for="calc-zoom-input">Zoom (px/s)</label>
                <input id="calc-zoom-input" type="range" min="10" max="120" step="5" value="40" class="w-40">
            </section>

            <!-- Enemy panel -->
            <section class="rotation-totals">
                <h3 class="text-sm font-semibold text-muted-foreground uppercase tracking-wide mb-3">Enemy</h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
                    <div>
                        <label class="text-[11px] text-muted-foreground">Level</label>
                        <input id="enemy-level-input" type="number" min="1" max="100" value="90"
                            class="field-input h-9 w-full rounded-md border border-input bg-transparent px-2 text-sm">
                    </div>
                    <div>
                        <label class="text-[11px] text-muted-foreground">DEF Shred %</label>
                        <input id="enemy-def-shred-input" type="number" step="1" value="0"
                            class="field-input h-9 w-full rounded-md border border-input bg-transparent px-2 text-sm">
                    </div>
                    <div>
                        <label class="text-[11px] text-muted-foreground">DEF Ignore %</label>
                        <input id="enemy-def-ignore-input" type="number" step="1" value="0"
                            class="field-input h-9 w-full rounded-md border border-input bg-transparent px-2 text-sm">
                    </div>
                </div>
                <div id="enemy-res-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
            </section>

            <!-- Timeline -->
            <section class="rotation-timeline-panel">
                <h3 class="text-sm font-semibold text-muted-foreground uppercase tracking-wide mb-3">Rotation Timeline</h3>
                <div class="calc-ruler-wrap">
                    <div id="calc-ruler" class="calc-ruler"></div>
                </div>
                <div id="calc-lanes" class="calc-lanes"></div>
            </section>

            <!-- DPS / DPR charts -->
            <section class="rotation-totals">
                <h3 class="text-sm font-semibold text-muted-foreground uppercase tracking-wide mb-3">Team DPS / DPR Contribution</h3>
                <div class="calc-charts-grid">
                    <div class="calc-chart-box">
                        <svg id="calc-pie-chart" viewBox="0 0 200 200" class="calc-pie-svg"></svg>
                    </div>
                    <div class="calc-chart-box">
                        <svg id="calc-bar-chart" class="calc-bar-svg"></svg>
                    </div>
                </div>
                <div id="calc-chart-legend" class="calc-chart-legend mt-4"></div>
            </section>

        </main>
    </div>

    <script src="js/characterData.js"></script>
    <script src="js/weaponData.js"></script>
    <script src="js/artifactData.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
